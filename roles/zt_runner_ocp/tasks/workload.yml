---
- name: Create ZT runner ClusterRole
  kubernetes.core.k8s:
    host: "{{ zt_runner_ocp_openshift_api_url | default(omit) }}"
    api_key: "{{ zt_runner_ocp_openshift_api_token | default(omit) }}"
    validate_certs: false
    state: present
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRole
      metadata:
        name: "{{ zt_runner_ocp_clusterrole_name }}"
        labels:
          created-by: rhpds-loadtester
          guid: "{{ guid }}"
      rules:
        - apiGroups: [""]
          resources: ["namespaces"]
          verbs: ["get", "list", "create", "patch", "update"]
        - apiGroups: [""]
          resources: ["configmaps", "pods", "secrets", "services"]
          verbs: ["get", "list", "create", "patch", "update", "delete"]
        - apiGroups: ["apps"]
          resources: ["deployments", "replicasets"]
          verbs: ["get", "list", "create", "patch", "update"]
        - apiGroups: ["route.openshift.io"]
          resources: ["routes"]
          verbs: ["get", "list", "create", "patch", "update"]

- name: Create ZT runner ClusterRoleBinding
  kubernetes.core.k8s:
    host: "{{ zt_runner_ocp_openshift_api_url | default(omit) }}"
    api_key: "{{ zt_runner_ocp_openshift_api_token | default(omit) }}"
    validate_certs: false
    state: present
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRoleBinding
      metadata:
        name: "{{ zt_runner_ocp_clusterrole_name }}"
        labels:
          created-by: rhpds-loadtester
          guid: "{{ guid }}"
      subjects:
        - kind: ServiceAccount
          name: showroom
          namespace: "{{ zt_runner_ocp_showroom_namespace }}"
      roleRef:
        kind: ClusterRole
        name: "{{ zt_runner_ocp_clusterrole_name }}"
        apiGroup: rbac.authorization.k8s.io

- name: Patch nginx configmap with /runner route
  kubernetes.core.k8s:
    host: "{{ zt_runner_ocp_openshift_api_url | default(omit) }}"
    api_key: "{{ zt_runner_ocp_openshift_api_token | default(omit) }}"
    validate_certs: false
    state: present
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: showroom-proxy-config
        namespace: "{{ zt_runner_ocp_showroom_namespace }}"
      data:
        nginx.conf: |
          events {}
          error_log /dev/stdout info;
          http {
            include /etc/nginx/mime.types;
            proxy_cache off;
            expires -1;
            proxy_cache_path /dev/null keys_zone=mycache:10m;
            map $http_upgrade $connection_upgrade {
                default upgrade;
                '' close;
            }
            server {
              listen 8080;
              absolute_redirect off;
              location / {
                proxy_pass http://127.0.0.1:8000;
                expires off;
                proxy_cache off;
                proxy_pass_request_headers on;
                proxy_set_header Accept-Encoding "gzip";
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
              }
              location ^~ /runner {
                rewrite ^/runner(/.*)$ $1 break;
                proxy_pass http://127.0.0.1:8501/;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection $connection_upgrade;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
              }
              location = /healthz { proxy_pass http://127.0.0.1:8090/healthz; }
              location = /readyz  { proxy_pass http://127.0.0.1:8090/readyz; }
            }
          }

- name: Check if runner container already present
  kubernetes.core.k8s_info:
    host: "{{ zt_runner_ocp_openshift_api_url | default(omit) }}"
    api_key: "{{ zt_runner_ocp_openshift_api_token | default(omit) }}"
    validate_certs: false
    api_version: apps/v1
    kind: Deployment
    name: showroom
    namespace: "{{ zt_runner_ocp_showroom_namespace }}"
  register: r_deploy

- name: Add runner container to showroom deployment
  when:
    - r_deploy.resources | length > 0
    - >-
      r_deploy.resources[0].spec.template.spec.containers
      | selectattr('name', 'equalto', 'runner') | list | length == 0
  kubernetes.core.k8s_json_patch:
    host: "{{ zt_runner_ocp_openshift_api_url | default(omit) }}"
    api_key: "{{ zt_runner_ocp_openshift_api_token | default(omit) }}"
    validate_certs: false
    api_version: apps/v1
    kind: Deployment
    name: showroom
    namespace: "{{ zt_runner_ocp_showroom_namespace }}"
    patch:
      - op: add
        path: /spec/template/spec/containers/-
        value:
          name: runner
          image: "{{ zt_runner_ocp_image }}"
          imagePullPolicy: Always
          ports:
            - containerPort: 8501
              name: runner
              protocol: TCP
          env:
            - {name: PORT, value: "{{ zt_runner_ocp_port }}"}
            - {name: DEBUG, value: "true"}
            - {name: GUID, value: "{{ guid }}"}
            - {name: DOMAIN, value: "{{ openshift_cluster_ingress_domain | default('') }}"}
            - {name: LAB_USER, value: "{{ zt_runner_ocp_lab_user }}"}
            - {name: ANSIBLE_USER, value: localonly}
            - {name: ANSIBLE_PASSWORD, value: localonly}
            - {name: BASTION_HOST, value: localhost}
            - {name: BASTION_PORT, value: "22"}
          volumeMounts:
            - {name: showroom-files, mountPath: /app/runtime-automation, subPath: repo/runtime-automation}
            - {name: showroom-files, mountPath: /app/artifacts, subPath: artifacts}
            - {name: showroom-files, mountPath: /app/logs, subPath: logs}
          resources:
            requests: {cpu: 100m, memory: 256Mi}
            limits: {cpu: 500m, memory: 512Mi}

- name: Wait for showroom rollout with runner
  kubernetes.core.k8s_info:
    host: "{{ zt_runner_ocp_openshift_api_url | default(omit) }}"
    api_key: "{{ zt_runner_ocp_openshift_api_token | default(omit) }}"
    validate_certs: false
    api_version: apps/v1
    kind: Deployment
    name: showroom
    namespace: "{{ zt_runner_ocp_showroom_namespace }}"
    wait: true
    wait_condition:
      type: Available
      status: "True"
    wait_timeout: 120
