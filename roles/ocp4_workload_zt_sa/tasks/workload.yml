---
# Grant showroom SA admin access to ALL student namespaces via RoleBinding.
# Loops over ocp4_workload_tenant_namespace_suffixes — same list AgV uses.
# Namespace format: {username}-{suffix}  e.g. devuser-abc12-zttest

- name: Grant showroom SA access to student namespaces
  kubernetes.core.k8s:
    host: "{{ zt_runner_ocp_openshift_api_url | default(omit) }}"
    api_key: "{{ zt_runner_ocp_openshift_api_token | default(omit) }}"
    validate_certs: false
    state: present
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: RoleBinding
      metadata:
        name: showroom-runner
        namespace: "{{ zt_runner_ocp_username }}-{{ item.suffix }}"
        labels:
          created-by: rhpds-ftl
          guid: "{{ guid }}"
      subjects:
        - kind: ServiceAccount
          name: showroom
          namespace: "{{ zt_runner_ocp_showroom_namespace }}"
      roleRef:
        kind: ClusterRole
        name: admin
        apiGroup: rbac.authorization.k8s.io
  loop: "{{ zt_runner_ocp_namespace_suffixes }}"
  loop_control:
    label: "{{ zt_runner_ocp_username }}-{{ item.suffix }}"
