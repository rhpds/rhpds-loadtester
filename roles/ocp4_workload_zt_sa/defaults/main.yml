---
# Namespace suffixes — auto-derived from ocp4_workload_tenant_namespace_suffixes
# The role creates a RoleBinding in EVERY student namespace.
# No need to set separately — uses the same list as ocp4_workload_tenant_namespace.
zt_runner_ocp_namespace_suffixes: >-
  {{ ocp4_workload_tenant_namespace_suffixes | default([]) }}

# Username — auto-derived from keycloak workload
zt_runner_ocp_username: >-
  {{ ocp4_workload_tenant_keycloak_username | default('user-' + guid) }}

# Showroom namespace (where showroom SA lives)
zt_runner_ocp_showroom_namespace: >-
  {{
    ocp4_workload_showroom_namespace
    | default(ocp4_workload_tenant_keycloak_username | default('user-' + guid) + '-showroom')
  }}

# Cluster connection
zt_runner_ocp_openshift_api_url: "{{ openshift_api_url | default('') }}"
zt_runner_ocp_openshift_api_token: "{{ openshift_api_key | default('') }}"
