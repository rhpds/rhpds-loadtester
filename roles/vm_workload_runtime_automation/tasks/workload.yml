---
# =============================================================================
# vm_workload_runtime_automation
#
# Runs on the bastion AFTER vm_workload_showroom.
# Prepares the ansible-runner-api container for ZT grading.
# Both files written to /opt/showroom/.ssh/ on bastion — mounted as
# /app/.ssh/ in the container. Persists through all restarts automatically.
#   1. id_rsa       — lab SSH key for connecting to nodes
#   2. config       — SSH config with Host entries (name → IP) for all nodes
#
# Node discovery: union of both sources
#   - instances (AgV cloud-vms-base list) filtered by AnsibleGroup tag
#   - Ansible inventory groups (vm_workload_runtime_automation_node_groups)
# =============================================================================

- name: Copy lab SSH key to showroom .ssh directory
  become: true
  ansible.builtin.copy:
    src: "{{ vm_workload_runtime_automation_ssh_key_src }}"
    dest: "{{ vm_workload_runtime_automation_ssh_key_dest }}"
    owner: "{{ vm_workload_runtime_automation_showroom_user }}"
    group: "{{ vm_workload_runtime_automation_showroom_user }}"
    mode: '0600'
    remote_src: true

- name: Build node list from AgV instances + inventory groups
  ansible.builtin.set_fact:
    _zt_node_names: >-
      {%- set result = [] -%}

      {%- if instances is defined -%}
        {%- for inst in instances -%}
          {%- set is_node = false -%}
          {%- for tag in inst.tags | default([]) -%}
            {%- if tag.key == 'AnsibleGroup' -%}
              {%- for grp in vm_workload_runtime_automation_node_groups -%}
                {%- if grp in tag.value -%}
                  {%- set is_node = true -%}
                {%- endif -%}
              {%- endfor -%}
            {%- endif -%}
          {%- endfor -%}
          {%- if is_node -%}
            {%- if inst.unique | default(false) | bool or (inst.count | default(1) | int) == 1 -%}
              {%- if inst.name not in result -%}
                {%- set _ = result.append(inst.name) -%}
              {%- endif -%}
            {%- else -%}
              {%- for i in range(1, (inst.count | default(1) | int) + 1) -%}
                {%- set name = inst.name ~ i -%}
                {%- if name not in result -%}
                  {%- set _ = result.append(name) -%}
                {%- endif -%}
              {%- endfor -%}
            {%- endif -%}
          {%- endif -%}
        {%- endfor -%}
      {%- endif -%}

      {%- for group in vm_workload_runtime_automation_node_groups -%}
        {%- for node in groups[group] | default([]) -%}
          {%- if node not in result -%}
            {%- set _ = result.append(node) -%}
          {%- endif -%}
        {%- endfor -%}
      {%- endfor -%}

      {{ result }}

- name: Resolve node IPs via bastion DNS
  ansible.builtin.command: getent hosts {{ item }}
  loop: "{{ _zt_node_names }}"
  register: r_getent
  failed_when: false
  changed_when: false

- name: Resolve bastion service IP via cluster DNS
  ansible.builtin.command: >
    getent hosts bastion.sandbox-{{ guid }}-ocp4-cluster.svc.cluster.local
  register: r_bastion_ip
  failed_when: false
  changed_when: false

- name: Write SSH config with bastion + node host entries
  become: true
  ansible.builtin.blockinfile:
    path: "{{ vm_workload_runtime_automation_ssh_key_dest | dirname }}/config"
    create: true
    owner: "{{ vm_workload_runtime_automation_showroom_user }}"
    group: "{{ vm_workload_runtime_automation_showroom_user }}"
    mode: '0600'
    marker: "# {mark} ZT hosts"
    block: |
      {% if r_bastion_ip.rc == 0 and r_bastion_ip.stdout != '' %}
      # bastion — runner SSHes here for bastion-level tasks
      Host bastion
        HostName {{ r_bastion_ip.stdout.split()[0] }}
        User {{ student_name | default('lab-user') }}
        IdentityFile /app/.ssh/id_rsa
        StrictHostKeyChecking no
        UserKnownHostsFile /dev/null
      {% endif %}

      {% for item in r_getent.results %}
      {% if item.rc == 0 and item.stdout != '' %}
      Host {{ item.item }}
        HostName {{ item.stdout.split()[0] }}
        User lab-user
        IdentityFile /app/.ssh/id_rsa
        StrictHostKeyChecking no
        UserKnownHostsFile /dev/null
      {% endif %}
      {% endfor %}
