---
# =============================================================================
# vm_workload_runtime_automation
#
# Runs on the bastion AFTER vm_workload_showroom.
# Prepares the ansible-runner-api container for ZT grading:
#   1. Copies the lab SSH key so the runner can SSH to nodes
#      (persists on bastion disk — survives restarts via volume mount)
#   2. Resolves node IPs via bastion DNS and adds extra_hosts to compose
#      (persists through container restarts — written to compose file)
#
# Node discovery: union of both sources
#   - instances (AgV cloud-vms-base list) filtered by AnsibleGroup tag
#   - Ansible inventory groups (vm_workload_runtime_automation_node_groups)
# =============================================================================

- name: Copy lab SSH key to showroom .ssh directory
  become: true
  ansible.builtin.copy:
    src: "{{ vm_workload_runtime_automation_ssh_key_src }}"
    dest: "{{ vm_workload_runtime_automation_ssh_key_dest }}"
    owner: "{{ vm_workload_runtime_automation_showroom_user }}"
    group: "{{ vm_workload_runtime_automation_showroom_user }}"
    mode: '0600'
    remote_src: true

- name: Build node list from AgV instances + inventory groups
  ansible.builtin.set_fact:
    _zt_node_names: >-
      {%- set result = [] -%}

      {%- if instances is defined -%}
        {%- for inst in instances -%}
          {%- set is_node = false -%}
          {%- for tag in inst.tags | default([]) -%}
            {%- if tag.key == 'AnsibleGroup' -%}
              {%- for grp in vm_workload_runtime_automation_node_groups -%}
                {%- if grp in tag.value -%}
                  {%- set is_node = true -%}
                {%- endif -%}
              {%- endfor -%}
            {%- endif -%}
          {%- endfor -%}
          {%- if is_node -%}
            {%- if inst.unique | default(false) | bool or (inst.count | default(1) | int) == 1 -%}
              {%- if inst.name not in result -%}
                {%- set _ = result.append(inst.name) -%}
              {%- endif -%}
            {%- else -%}
              {%- for i in range(1, (inst.count | default(1) | int) + 1) -%}
                {%- set name = inst.name ~ i -%}
                {%- if name not in result -%}
                  {%- set _ = result.append(name) -%}
                {%- endif -%}
              {%- endfor -%}
            {%- endif -%}
          {%- endif -%}
        {%- endfor -%}
      {%- endif -%}

      {%- for group in vm_workload_runtime_automation_node_groups -%}
        {%- for node in groups[group] | default([]) -%}
          {%- if node not in result -%}
            {%- set _ = result.append(node) -%}
          {%- endif -%}
        {%- endfor -%}
      {%- endfor -%}

      {{ result }}

- name: Resolve node IPs via bastion DNS
  ansible.builtin.command: getent hosts {{ item }}
  loop: "{{ _zt_node_names }}"
  register: r_getent
  failed_when: false
  changed_when: false

- name: Build extra_hosts list for compose
  ansible.builtin.set_fact:
    _zt_extra_hosts: >-
      {%- set result = [] -%}
      {%- for item in r_getent.results -%}
        {%- if item.rc == 0 and item.stdout != '' -%}
          {%- set _ = result.append(item.stdout.split()[0] ~ ':' ~ item.item) -%}
        {%- endif -%}
      {%- endfor -%}
      {{ result }}

- name: Add extra_hosts to ansible-runner-api in compose (persists through restarts)
  become: true
  ansible.builtin.blockinfile:
    path: "{{ vm_workload_runtime_automation_compose_file }}"
    insertafter: "container_name: ansible-runner-api"
    marker: "    # {mark} ZT extra_hosts"
    block: |
      {% if _zt_extra_hosts | length > 0 %}
          extra_hosts:
      {% for entry in _zt_extra_hosts %}
            - "{{ entry }}"
      {% endfor %}
      {% endif %}
  when: _zt_extra_hosts | length > 0
  notify: restart showroom service

- name: Flush handlers
  ansible.builtin.meta: flush_handlers
