---
# =============================================================================
# vm_runtime_automation_load_test
# Runs ON the bastion host — showroom/runner are local (podman compose)
# No kubernetes.core needed — curls localhost directly
# Add to: post_software_final_workloads.bastions (after vm_workload_runtime_automation)
# =============================================================================

- name: Wait for runner to be ready on bastion
  ansible.builtin.uri:
    url: "http://localhost:{{ zt_load_test_rhel_runner_port }}/health"
    status_code: 200
  register: r_health
  retries: "{{ (zt_load_test_rhel_wait_seconds | int / 10) | int }}"
  delay: 10
  until: r_health.status == 200
  ignore_errors: true

- name: Get available modules
  ansible.builtin.uri:
    url: "http://localhost:{{ zt_load_test_rhel_runner_port }}/config"
    status_code: 200
  register: r_config
  when: r_health is not failed

- name: Set modules list
  ansible.builtin.set_fact:
    _modules: "{{ r_config.json.keys() | list | sort }}"
  when: r_config is not skipped

- name: "Run solve on all modules: {{ _modules | default([]) }}"
  ansible.builtin.shell:
    cmd: >-
      curl -sk -N --max-time {{ zt_load_test_rhel_module_timeout }}
      "http://localhost:{{ zt_load_test_rhel_runner_port }}/solve/{{ item }}"
  register: r_solve_results
  loop: "{{ _modules | default([]) }}"
  loop_control:
    label: "{{ item }}"
  ignore_errors: true
  when: _modules is defined

- name: "Run validate on all modules: {{ _modules | default([]) }}"
  ansible.builtin.shell:
    cmd: >-
      curl -sk -N --max-time {{ zt_load_test_rhel_module_timeout }}
      "http://localhost:{{ zt_load_test_rhel_runner_port }}/validate/{{ item }}"
  register: r_val_results
  loop: "{{ _modules | default([]) }}"
  loop_control:
    label: "{{ item }}"
  ignore_errors: true
  when: _modules is defined

- name: Build solve results summary
  ansible.builtin.set_fact:
    _solve_summary: >-
      {{ dict((_modules | default([])) | zip(
           r_solve_results.results | default([])
           | map(attribute='stdout', default='')
           | map('regex_search', '✓ Completed successfully!|✗ Failed')
           | map('default', 'unknown')
         )) }}
  when: _modules is defined

- name: Build validate results summary
  ansible.builtin.set_fact:
    _val_summary: >-
      {{ dict((_modules | default([])) | zip(
           r_val_results.results | default([])
           | map(attribute='stdout', default='')
           | map('regex_search', '✓ Completed successfully!|✗ Failed')
           | map('default', 'unknown')
         )) }}
  when: _modules is defined

- name: Report load test results
  ansible.builtin.debug:
    msg: |
      ═══════════════════════════════════════
      E2E Load Test (RHEL/VM bastion)
      ═══════════════════════════════════════
      {% for m in (_modules | default([])) %}
      {{ m }}:
        Solve:    {{ (_solve_summary | default({}))[m] | default('unknown') }}
        Validate: {{ (_val_summary | default({}))[m] | default('unknown') }}
      {% endfor %}
      ═══════════════════════════════════════
  when: _modules is defined

- name: Log failures (non-blocking)
  ansible.builtin.debug:
    msg: >-
      ⚠️ E2E load test issues (provision continues):
      Solve:    {{ _solve_summary | default({}) }}
      Validate: {{ _val_summary | default({}) }}
  when:
    - _modules is defined
    - >-
      '✗ Failed' in ((_solve_summary | default({})).values() | list) or
      '✗ Failed' in ((_val_summary | default({})).values() | list)
