---
# =============================================================================
# vm_runtime_automation_load_test
# Trigger solve + validate on all modules via SSE /stream/ API (RHEL/VM labs)
# Showroom is on OCP even for VM labs; runner accessible via route.
# =============================================================================

- name: Get showroom route
  kubernetes.core.k8s_info:
    host: "{{ zt_load_test_rhel_openshift_api_url | default(omit) }}"
    api_key: "{{ zt_load_test_rhel_openshift_api_token | default(omit) }}"
    validate_certs: false
    api_version: route.openshift.io/v1
    kind: Route
    namespace: "{{ zt_load_test_rhel_showroom_namespace }}"
  register: r_route

- name: Fail if showroom route not found
  ansible.builtin.fail:
    msg: "Showroom route not found in {{ zt_load_test_rhel_showroom_namespace }}"
  when: r_route.resources | length == 0

- name: Set runner base URL (SSE /stream/ API)
  ansible.builtin.set_fact:
    _runner_url: "https://{{ r_route.resources[0].spec.host }}/stream"

- name: Wait for runner to be ready
  ansible.builtin.uri:
    url: "{{ _runner_url }}/health"
    validate_certs: false
    status_code: 200
  register: r_health
  retries: "{{ (zt_load_test_rhel_wait_seconds | int / 10) | int }}"
  delay: 10
  until: r_health.status == 200

- name: Get available modules
  ansible.builtin.uri:
    url: "{{ _runner_url }}/config"
    validate_certs: false
    status_code: 200
  register: r_config

- name: Set modules list
  ansible.builtin.set_fact:
    _modules: "{{ r_config.json.keys() | list | sort }}"

- name: "Run solve on all modules: {{ _modules }}"
  ansible.builtin.shell:
    cmd: >-
      curl -sk -N --max-time {{ zt_load_test_rhel_module_timeout }}
      "{{ _runner_url }}/solve/{{ item }}"
  register: r_solve_results
  loop: "{{ _modules }}"
  loop_control:
    label: "{{ item }}"
  ignore_errors: true

- name: "Run validate on all modules: {{ _modules }}"
  ansible.builtin.shell:
    cmd: >-
      curl -sk -N --max-time {{ zt_load_test_rhel_module_timeout }}
      "{{ _runner_url }}/validate/{{ item }}"
  register: r_val_results
  loop: "{{ _modules }}"
  loop_control:
    label: "{{ item }}"
  ignore_errors: true

- name: Build solve results summary
  ansible.builtin.set_fact:
    _solve_summary: >-
      {{ dict(_modules | zip(
           r_solve_results.results
           | map(attribute='stdout', default='')
           | map('regex_search', '✓ Completed successfully!|✗ Failed')
           | map('default', 'unknown')
         )) }}

- name: Build validate results summary
  ansible.builtin.set_fact:
    _val_summary: >-
      {{ dict(_modules | zip(
           r_val_results.results
           | map(attribute='stdout', default='')
           | map('regex_search', '✓ Completed successfully!|✗ Failed')
           | map('default', 'unknown')
         )) }}

- name: Report load test results
  agnosticd.core.agnosticd_user_info:
    data:
      zt_load_test_solve: "{{ _solve_summary }}"
      zt_load_test_validate: "{{ _val_summary }}"
    msg: |
      E2E Load Test (RHEL/VM) — {{ zt_load_test_rhel_showroom_namespace }}
      Solve:    {{ _solve_summary }}
      Validate: {{ _val_summary }}
  ignore_errors: true

- name: Fail if any validation failed
  ansible.builtin.fail:
    msg: >-
      E2E load test failures!
      Solve:    {{ _solve_summary }}
      Validate: {{ _val_summary }}
  when: >-
    '✗ Failed' in (_solve_summary.values() | list) or
    '✗ Failed' in (_val_summary.values() | list) or
    'unknown' in (_val_summary.values() | list)
