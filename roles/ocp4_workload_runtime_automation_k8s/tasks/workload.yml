---
# =============================================================================
# ocp4_workload_runtime_automation_k8s
#
# Creates a zt-runner SA in the showroom namespace and generates a kubeconfig
# Secret for use by the ZT runner (jobs.py) and lab playbooks.
#
# Multi-user mode (default):
#   - SA gets admin RoleBinding in each student namespace
#   - Scoped to student namespaces only
#
# Dedicated cluster mode (cluster_admin: true):
#   - SA gets cluster-admin ClusterRoleBinding
#   - Student owns the whole cluster
# =============================================================================

- name: Discover showroom namespace by listing namespaces matching showroom-{guid}*
  when: ocp4_workload_showroom_namespace is not defined
  kubernetes.core.k8s_info:
    host: "{{ ocp4_workload_runtime_automation_k8s_openshift_api_url | default(omit) }}"
    api_key: "{{ ocp4_workload_runtime_automation_k8s_openshift_api_token | default(omit) }}"
    validate_certs: false
    api_version: v1
    kind: Namespace
  register: r_all_ns

- name: Set showroom namespace from discovered namespace (first match of showroom-{guid}*)
  when: ocp4_workload_showroom_namespace is not defined
  ansible.builtin.set_fact:
    ocp4_workload_runtime_automation_k8s_showroom_namespace: >-
      {{ r_all_ns.resources
         | map(attribute='metadata.name')
         | select('match', '^showroom-' + guid)
         | list
         | first
         | default('showroom-' + guid) }}

- name: Build student namespace list
  ansible.builtin.set_fact:
    _zt_runner_namespaces: >-
      {{ ocp4_workload_runtime_automation_k8s_namespace_suffixes
         | map(attribute='suffix')
         | map('regex_replace', '^(.+)$',
               ocp4_workload_runtime_automation_k8s_username + '-\1')
         | list }}

- name: Create zt-runner ServiceAccount in showroom namespace
  kubernetes.core.k8s:
    host: "{{ ocp4_workload_runtime_automation_k8s_openshift_api_url | default(omit) }}"
    api_key: "{{ ocp4_workload_runtime_automation_k8s_openshift_api_token | default(omit) }}"
    validate_certs: false
    state: present
    definition:
      apiVersion: v1
      kind: ServiceAccount
      metadata:
        name: "{{ ocp4_workload_runtime_automation_k8s_sa_name }}"
        namespace: "{{ ocp4_workload_runtime_automation_k8s_showroom_namespace }}"
        labels:
          created-by: rhpds-ftl
          guid: "{{ guid }}"

- name: Create long-lived token Secret for zt-runner SA
  kubernetes.core.k8s:
    host: "{{ ocp4_workload_runtime_automation_k8s_openshift_api_url | default(omit) }}"
    api_key: "{{ ocp4_workload_runtime_automation_k8s_openshift_api_token | default(omit) }}"
    validate_certs: false
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: zt-runner-token
        namespace: "{{ ocp4_workload_runtime_automation_k8s_showroom_namespace }}"
        annotations:
          kubernetes.io/service-account.name: "{{ ocp4_workload_runtime_automation_k8s_sa_name }}"
        labels:
          created-by: rhpds-ftl
          guid: "{{ guid }}"
      type: kubernetes.io/service-account-token

- name: Wait for token to be populated
  kubernetes.core.k8s_info:
    host: "{{ ocp4_workload_runtime_automation_k8s_openshift_api_url | default(omit) }}"
    api_key: "{{ ocp4_workload_runtime_automation_k8s_openshift_api_token | default(omit) }}"
    validate_certs: false
    api_version: v1
    kind: Secret
    name: zt-runner-token
    namespace: "{{ ocp4_workload_runtime_automation_k8s_showroom_namespace }}"
  register: r_token
  retries: 12
  delay: 5
  until: r_token.resources[0].data.token is defined

# ── Multi-user mode ───────────────────────────────────────────────────────────
- name: Grant zt-runner SA admin in each student namespace
  when: not (ocp4_workload_runtime_automation_k8s_cluster_admin | bool)
  kubernetes.core.k8s:
    host: "{{ ocp4_workload_runtime_automation_k8s_openshift_api_url | default(omit) }}"
    api_key: "{{ ocp4_workload_runtime_automation_k8s_openshift_api_token | default(omit) }}"
    validate_certs: false
    state: present
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: RoleBinding
      metadata:
        name: zt-runner
        namespace: "{{ item }}"
        labels:
          created-by: rhpds-ftl
          guid: "{{ guid }}"
      subjects:
        - kind: ServiceAccount
          name: "{{ ocp4_workload_runtime_automation_k8s_sa_name }}"
          namespace: "{{ ocp4_workload_runtime_automation_k8s_showroom_namespace }}"
      roleRef:
        kind: ClusterRole
        name: admin
        apiGroup: rbac.authorization.k8s.io
  loop: "{{ _zt_runner_namespaces }}"

# ── Dedicated cluster mode ────────────────────────────────────────────────────
- name: Grant zt-runner SA cluster-admin (dedicated mode)
  when: ocp4_workload_runtime_automation_k8s_cluster_admin | bool
  kubernetes.core.k8s:
    host: "{{ ocp4_workload_runtime_automation_k8s_openshift_api_url | default(omit) }}"
    api_key: "{{ ocp4_workload_runtime_automation_k8s_openshift_api_token | default(omit) }}"
    validate_certs: false
    state: present
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRoleBinding
      metadata:
        name: "zt-runner-{{ guid }}"
        labels:
          created-by: rhpds-ftl
          guid: "{{ guid }}"
      subjects:
        - kind: ServiceAccount
          name: "{{ ocp4_workload_runtime_automation_k8s_sa_name }}"
          namespace: "{{ ocp4_workload_runtime_automation_k8s_showroom_namespace }}"
      roleRef:
        kind: ClusterRole
        name: cluster-admin
        apiGroup: rbac.authorization.k8s.io

# ── Build and store kubeconfig Secret ────────────────────────────────────────
- name: Store kubeconfig Secret in showroom namespace
  kubernetes.core.k8s:
    host: "{{ ocp4_workload_runtime_automation_k8s_openshift_api_url | default(omit) }}"
    api_key: "{{ ocp4_workload_runtime_automation_k8s_openshift_api_token | default(omit) }}"
    validate_certs: false
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: "{{ ocp4_workload_runtime_automation_k8s_secret_name }}"
        namespace: "{{ ocp4_workload_runtime_automation_k8s_showroom_namespace }}"
        labels:
          created-by: rhpds-ftl
          guid: "{{ guid }}"
          mode: "{{ 'cluster-admin' if ocp4_workload_runtime_automation_k8s_cluster_admin | bool else 'namespace-admin' }}"
      stringData:
        kubeconfig: |
          apiVersion: v1
          kind: Config
          clusters:
          - name: cluster
            cluster:
              server: "{{ ocp4_workload_runtime_automation_k8s_openshift_api_url | default('https://kubernetes.default.svc') }}"
              insecure-skip-tls-verify: true
          contexts:
          - name: zt-runner
            context:
              cluster: cluster
              user: zt-runner
          current-context: zt-runner
          users:
          - name: zt-runner
            user:
              token: "{{ r_token.resources[0].data.token | b64decode }}"

# ── Patch showroom nginx — add /stream/ SSE block ─────────────────────────────
- name: Get showroom proxy nginx ConfigMap
  kubernetes.core.k8s_info:
    host: "{{ ocp4_workload_runtime_automation_k8s_openshift_api_url | default(omit) }}"
    api_key: "{{ ocp4_workload_runtime_automation_k8s_openshift_api_token | default(omit) }}"
    validate_certs: false
    api_version: v1
    kind: ConfigMap
    name: "{{ ocp4_workload_runtime_automation_k8s_nginx_cm_name }}"
    namespace: "{{ ocp4_workload_runtime_automation_k8s_showroom_namespace }}"
  register: r_nginx_cm

- name: Patch nginx config — replace /runner with /stream/ SSE block
  when:
    - r_nginx_cm.resources | length > 0
    - "'/stream/' not in (r_nginx_cm.resources[0].data['nginx.conf'] | default(''))"
  vars:
    _current_conf: "{{ r_nginx_cm.resources[0].data['nginx.conf'] }}"
    _stream_block: |2
              location /stream/ {
                proxy_pass http://127.0.0.1:{{ ocp4_workload_runtime_automation_k8s_runner_port }}/;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_buffering off;
                proxy_cache off;
                proxy_read_timeout 3600s;
                proxy_connect_timeout 3600s;
                chunked_transfer_encoding off;
              }
  kubernetes.core.k8s:
    host: "{{ ocp4_workload_runtime_automation_k8s_openshift_api_url | default(omit) }}"
    api_key: "{{ ocp4_workload_runtime_automation_k8s_openshift_api_token | default(omit) }}"
    validate_certs: false
    state: present
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: "{{ ocp4_workload_runtime_automation_k8s_nginx_cm_name }}"
        namespace: "{{ ocp4_workload_runtime_automation_k8s_showroom_namespace }}"
      data:
        nginx.conf: "{{ _current_conf | regex_replace('(?s)\\s+location \\^~ /runner \\{.*?\\}', '\n' + _stream_block) }}"

- name: Restart showroom deployment to reload nginx config
  when:
    - r_nginx_cm.resources | length > 0
    - "'/stream/' not in (r_nginx_cm.resources[0].data['nginx.conf'] | default(''))"
  kubernetes.core.k8s:
    host: "{{ ocp4_workload_runtime_automation_k8s_openshift_api_url | default(omit) }}"
    api_key: "{{ ocp4_workload_runtime_automation_k8s_openshift_api_token | default(omit) }}"
    validate_certs: false
    state: present
    definition:
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: showroom
        namespace: "{{ ocp4_workload_runtime_automation_k8s_showroom_namespace }}"
        annotations:
          kubectl.kubernetes.io/restartedAt: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ') }}"
